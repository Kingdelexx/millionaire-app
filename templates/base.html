{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Raffle | Win 80%</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <nav class="glass">
        <a href="{% url 'index' %}" class="logo">WINNER</a>
        <div class="links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <form method="post" action="{% url 'account_logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="padding: 0.5rem 1rem; margin-left: 1rem;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'account_login' %}" class="btn" style="padding: 0.5rem 1rem;">Login with Google</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
